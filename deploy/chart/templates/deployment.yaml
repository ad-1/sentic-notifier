apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentic-notifier.fullname" . }}
  namespace: sentic
  labels:
    {{- include "sentic-notifier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentic-notifier.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sentic-notifier.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: sentic-notifier
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # RabbitMQ — credentials from the secret auto-created by the RabbitMQ Cluster Operator
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: host
            - name: RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: port
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rabbitmq.secretName }}
                  key: password
            - name: RABBITMQ_QUEUE
              value: {{ .Values.rabbitmq.queue | quote }}
            # Telegram — must be provisioned separately; see docs/ONBOARDING.md
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName }}
                  key: bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telegram.secretName }}
                  key: chat-id
          resources:
            {{- toYaml .Values.resources | nindent 12 }}